    class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = 'ValidationError';
  }
}

class DivisionByZeroError extends Error {
  constructor() {
    super('Cannot divide by zero');
    this.name = 'DivisionByZeroError';
  }
}


class MissingElementError extends Error {
  constructor(selector) {
    super(`Required DOM element not found: "${selector}"`);
    this.name = 'MissingElementError';
  }
}
const banner = document.createElement('div');
banner.id = 'status-banner';
banner.style.cssText = 'display:none;margin-top:10px;padding:8px 12px;border-left:4px solid gray;font-family:monospace;font-size:0.9rem;max-width:500px;';
document.querySelector('fieldset').appendChild(banner);

function showBanner(type, message) {
  const colors = { success:'green', error:'crimson', warning:'orange', info:'steelblue' };
  banner.style.borderColor = colors[type] || 'gray';
  banner.style.background = type === 'success' ? '#eaffea' : type === 'error' ? '#fff0f0' : type === 'warning' ? '#fffbe6' : '#eef5ff';
  banner.style.color = type === 'success' ? '#1a6e1a' : type === 'error' ? '#8b0000' : type === 'warning' ? '#7a5000' : '#1a3a6e';
  banner.textContent = message;
  banner.style.display = 'block';
}

function requireElement(selector) {
  const el = document.querySelector(selector);
  if (!el) throw new MissingElementError(selector);
  return el;
}

function calculate(a, b, operator) {
  if (isNaN(a) || a === '') throw new ValidationError(`"${a}" is not a valid number`);
  if (isNaN(b) || b === '') throw new ValidationError(`"${b}" is not a valid number`);
  const numA = Number(a);
  const numB = Number(b);
  switch (operator) {
    case '+': return numA + numB;
    case '-': return numA - numB;
    case '*': return numA * numB;
    case '/':
      if (numB === 0) throw new DivisionByZeroError();
      return numA / numB;
    default: throw `Unknown operator: "${operator}"`;
  }
}


    let form = document.querySelector('form');

    const result = calculate(firstNum, secondNum, operator);
    outputEl.innerHTML = result;

  } catch (err) {
    if (err instanceof ValidationError) {
      console.warn('Validation problem:', err.message);
      showBanner('warning', `⚠ Input error — ${err.message}`);
      if (outputEl) outputEl.innerHTML = 'Invalid input';
    } else if (err instanceof DivisionByZeroError) {
      console.error('Math error:', err.message);
      showBanner('error', `✘ ${err.message}`);
      if (outputEl) outputEl.innerHTML = 'Undefined';
    } else if (err instanceof MissingElementError) {
      console.error('DOM error:', err.message);
      showBanner('error', `✘ DOM error — ${err.message}`);
    } else {
      console.error('Unexpected error:', err);
      showBanner('error', `✘ Unexpected error — ${err}`);
    }
  } finally {
    console.log('finally — calculator attempt complete (success or failure)');
  }

    // ─── Custom Error Demo ───────────────────────────────────────────────────────
// Mirrors the pattern from javascript.info/custom-errors

// A deeper inheritance chain: HttpError extends a more general AppError,
// which itself extends the built-in Error. This is the "error hierarchy"
// pattern the article demonstrates — each level adds its own properties.

class AppError extends Error {
  constructor(message) {
    super(message);
    this.name = 'AppError';     // override name so it prints correctly in console
  }
}

class HttpError extends AppError {
  constructor(statusCode, message) {
    super(message);
    this.name    = 'HttpError';
    this.statusCode = statusCode; // custom property — not on base Error
  }
}


// Simulates fetching user data from a server. In a real app this would be
// a fetch() call. Here we fake the response so you can trigger each path
// without needing a real API.
function loadUser(userId) {
  const fakeResponses = {
    1: { status: 200, body: '{"id":1,"name":"Alice","role":"admin"}' },
    2: { status: 200, body: 'not valid json{{{'  },  // malformed — JSON.parse will throw
    3: { status: 404, body: null },
    4: { status: 403, body: null },
  };

  const response = fakeResponses[userId];

  if (!response) {
    // throw our own custom subclass — richer than a plain Error
    throw new HttpError(404, `No user found with id ${userId}`);
  }

  if (response.status === 404) {
    throw new HttpError(404, `User ${userId} does not exist on the server`);
  }

  if (response.status === 403) {
    throw new HttpError(403, `You do not have permission to view user ${userId}`);
  }

  // JSON.parse throws a built-in SyntaxError if the string is malformed.
  // We catch it and re-throw as our own type so callers only deal with AppError.
  // This is the "wrapping exceptions" pattern from the article.
  let parsed;
  try {
    parsed = JSON.parse(response.body);
  } catch (e) {
    if (e instanceof SyntaxError) {
      throw new AppError(`Server returned malformed JSON for user ${userId}: ${e.message}`);
    }
    throw e; // re-throw anything unexpected — don't silently swallow it
  }

  return parsed;
}

document.querySelector('#load-user-btn').addEventListener('click', () => {
  const userId = Number(document.querySelector('#user-id-input').value);
  const resultEl = document.querySelector('#user-result');

  try {
    const user = loadUser(userId);

    // Happy path — log the object both ways so you can compare in DevTools
    console.log('Loaded user (log):', user);
    console.dir(user);
    resultEl.style.borderColor = 'green';
    resultEl.textContent = `✔ Loaded: ${JSON.stringify(user, null, 2)}`;

  } catch (err) {

    // instanceof still works through the chain:
    // HttpError instanceof HttpError  → true
    // HttpError instanceof AppError   → true   (because HttpError extends AppError)
    // HttpError instanceof Error      → true   (because AppError extends Error)
    if (err instanceof HttpError) {
      console.error(`[${err.name}] HTTP ${err.statusCode} — ${err.message}`);
      resultEl.style.borderColor = err.statusCode === 404 ? 'orange' : 'crimson';
      resultEl.textContent = `✘ ${err.name} (${err.statusCode}): ${err.message}`;

    } else if (err instanceof AppError) {
      // Catches malformed-JSON case — it's an AppError but not an HttpError
      console.error(`[${err.name}] ${err.message}`);
      resultEl.style.borderColor = 'crimson';
      resultEl.textContent = `✘ ${err.name}: ${err.message}`;

    } else {
      // Should not reach here, but never swallow the unexpected
      console.error('Unhandled error type:', err);
      resultEl.style.borderColor = 'purple';
      resultEl.textContent = `✘ Unknown error: ${err.message}`;
    }
  }
});
